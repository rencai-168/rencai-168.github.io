<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <!-- SEO优化（符合Lighthouse要求） -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>人才网 - 首页</title>
    <meta name="description" content="专业人才服务平台，提供招聘、求职、企业服务">
    <style>
        /* 全局样式重置 */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }
        /* 固定顶部导航条 */
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background-color: #2c3e50;
            padding: 15px 0;
            z-index: 999;
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
        }
        /* 导航容器 */
        .nav-container {
            width: 90%;
            max-width: 1200px;
            margin: 0 auto;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 10px;
        }
        /* 导航按钮样式 */
        .nav-btn {
            padding: 10px 20px;
            color: white;
            text-decoration: none;
            font-size: 16px;
            border-radius: 4px;
            transition: background 0.3s;
        }
        /* 按钮悬浮效果 */
        .nav-btn:hover {
            background-color: #3498db;
        }
        /* 首页按钮高亮 */
        .nav-btn.active {
            background-color: #3498db;
        }
        /* 主体内容（避免被导航条遮挡） */
        .content {
            margin-top: 80px;
            padding: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <!-- 顶部导航条 -->
    <div class="navbar">
        <div class="nav-container">
            <a href="index.html" class="nav-btn active">首页</a>
            <a href="about.html" class="nav-btn">关于我们</a>
            <a href="product.html" class="nav-btn">产品中心</a>
            <a href="news.html" class="nav-btn">新闻资讯</a>
            <a href="job.html" class="nav-btn">人才招聘</a>
            <a href="contact.html" class="nav-btn">联系我们</a>
        </div>
    </div>

    <!-- 首页主体内容 -->
    <div class="content">
        <h1>欢迎来到人才服务平台</h1>
        <p>点击上方导航按钮，访问对应功能页面</p>
    </div>
</body>
</html>
